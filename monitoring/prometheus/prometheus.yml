global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8000']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8000']

  - job_name: 'account-service'
    static_configs:
      - targets: ['account-service:8000']

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['transaction-service:8000']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8000']

  - job_name: 'fraud-service'
    static_configs:
      - targets: ['fraud-service:8000']
