version: "3.9"

services:
  postgres-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
      POSTGRES_DB: userdb
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-account:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
      POSTGRES_DB: accountdb
    volumes:
      - pgdata-account:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d accountdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-transaction:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
      POSTGRES_DB: transactiondb
    volumes:
      - pgdata-transaction:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d transactiondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
      POSTGRES_DB: paymentdb
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d paymentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-fraud:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking123
      POSTGRES_DB: frauddb
    volumes:
      - pgdata-fraud:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d frauddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://banking:banking123@postgres-user:5432/userdb
      SECRET_KEY: super-secret-key
    depends_on:
      postgres-user:
        condition: service_healthy
    restart: unless-stopped

  account-service:
    build: ./account-service
    environment:
      DATABASE_URL: postgresql://banking:banking123@postgres-account:5432/accountdb
      SECRET_KEY: super-secret-key
    depends_on:
      postgres-account:
        condition: service_healthy
    restart: unless-stopped

  transaction-service:
    build: ./transaction-service
    environment:
      DATABASE_URL: postgresql://banking:banking123@postgres-transaction:5432/transactiondb
      ACCOUNT_SERVICE_URL: http://account-service:8000
    depends_on:
      postgres-transaction:
        condition: service_healthy
    restart: unless-stopped

  fraud-service:
    build: ./fraud-service
    environment:
      DATABASE_URL: postgresql://banking:banking123@postgres-fraud:5432/frauddb
    depends_on:
      postgres-fraud:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    environment:
      DATABASE_URL: postgresql://banking:banking123@postgres-payment:5432/paymentdb
      FRAUD_SERVICE_URL: http://fraud-service:8000
      ACCOUNT_SERVICE_URL: http://account-service:8000
      TRANSACTION_SERVICE_URL: http://transaction-service:8000
    depends_on:
      postgres-payment:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      USER_SERVICE_URL: http://user-service:8000
      ACCOUNT_SERVICE_URL: http://account-service:8000
      TRANSACTION_SERVICE_URL: http://transaction-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      FRAUD_SERVICE_URL: http://fraud-service:8000
    depends_on:
      - user-service
      - account-service
      - transaction-service
      - payment-service
      - fraud-service
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata-user:
  pgdata-account:
  pgdata-transaction:
  pgdata-payment:
  pgdata-fraud:
  grafana-data: