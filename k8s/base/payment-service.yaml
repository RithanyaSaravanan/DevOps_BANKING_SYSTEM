apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-v1
  namespace: banking
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
      version: v1
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
    spec:
      containers:
        - name: payment-service
          image: your-dockerhub/payment-service:v1
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: payment-db-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: jwt-secret
            - name: FRAUD_SERVICE_URL
              value: "http://fraud-service:8000"
            - name: ACCOUNT_SERVICE_URL
              value: "http://account-service:8000"
            - name: TRANSACTION_SERVICE_URL
              value: "http://transaction-service:8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: banking
spec:
  selector:
    app: payment-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
