apiVersion: v1
kind: Namespace
metadata:
  name: banking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: banking
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: your-dockerhub/gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: USER_SERVICE_URL
              value: "http://user-service:8000"
            - name: ACCOUNT_SERVICE_URL
              value: "http://account-service:8000"
            - name: TRANSACTION_SERVICE_URL
              value: "http://transaction-service:8000"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8000"
            - name: FRAUD_SERVICE_URL
              value: "http://fraud-service:8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: banking
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-ingress
  namespace: banking
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: banking.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
